version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: lsc_user
      POSTGRES_PASSWORD: lsc_password
      POSTGRES_DB: lsc_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://lsc_user:lsc_password@db:5432/lsc_platform
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
